<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>神州降神試算、掉落查詢系統｜免驗證版</title>
<style>
:root{--bg:#08101d;--panel:#0d1526;--line:#2b3a55;--text:#eaf2ff;--muted:#9fb2d1;--accent:#2dd4bf;--danger:#fb7185;--safe-bottom:max(8px, env(safe-area-inset-bottom))}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:#08101d;color:var(--text);font-family:"Microsoft JhengHei UI","Microsoft JhengHei",system-ui,sans-serif;overflow:hidden}
.top{position:fixed;left:0;right:0;top:0;z-index:50;background:rgba(8,16,29,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(10px);padding:10px 12px}
.topline{max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.title{font-size:18px;font-weight:900}.maker{font-size:12px;color:#fff;font-weight:800}
.badge{font-size:12px;color:#c9f8ff;border:1px solid var(--line);background:#0e1728;border-radius:999px;padding:6px 10px}
.category-hint{max-width:1280px;margin:8px auto 4px;font-size:12px;color:#9fb2d1;font-weight:900}.switch{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.switch button{border:2px solid #334155;background:#0d1526;color:#dbe7ff;border-radius:16px;padding:14px 10px;font-weight:1000;cursor:pointer;font:inherit;font-size:16px;box-shadow:0 8px 22px rgba(0,0,0,.2)}
.switch button.active{background:linear-gradient(135deg,#2dd4bf,#60a5fa);border-color:#7dd3fc;color:#04111f;box-shadow:0 0 0 3px rgba(96,165,250,.18),0 12px 28px rgba(45,212,191,.22)}
.frame-wrap{position:fixed;left:0;right:0;bottom:0;top:128px}
.tool-frame{width:100%;height:100%;border:0;display:none;background:#08101d}.tool-frame.active{display:block}
.modal-backdrop{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.76);display:none;align-items:center;justify-content:center;padding:14px}
.modal{width:min(700px,100%);background:#111827;border:1px solid #475569;border-radius:18px;padding:18px;box-shadow:0 25px 90px rgba(0,0,0,.55)}
textarea{width:100%;min-height:120px;border:1px solid #3a4a68;background:#0c1424;color:var(--text);border-radius:12px;padding:11px 12px;outline:none;font:inherit}
.error{color:var(--danger);font-weight:900;margin-top:8px}
.primary{border:0;border-radius:12px;background:var(--accent);color:#062a24;padding:10px 14px;font-weight:900;cursor:pointer;margin-top:10px;font:inherit}
@media(max-width:700px){.title{font-size:16px}.top{padding:8px 10px}.frame-wrap{top:132px}.switch button{font-size:13px;padding:9px 5px}}
</style>
</head>
<body>
<div id="mainShell">
  <div class="top">
    <div class="topline">
      <div class="title">神州降神試算、掉落查詢系統</div>
      <div><span class="badge" id="licenseStatus">免驗證版</span><span class="maker" style="margin-left:8px">製作By文昌 尼扣扣</span></div>
    </div>
    <div class="category-hint">主功能</div><div class="switch">
      <button id="btnJ" class="active" onclick="showTool('j')">降神試算</button>
      <button id="btnG" onclick="showTool('g')">掉落查詢</button>
    </div>
  </div>
  <div class="frame-wrap">
    <iframe id="frameJ" class="tool-frame active"></iframe>
    <iframe id="frameG" class="tool-frame"></iframe>
  </div>
</div>

function b64ToUtf8(b64){
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}
function initLicense(){document.getElementById('licenseStatus').textContent='免驗證版';document.getElementById('mainShell').style.display='block'}
function bootFrames(){
  document.getElementById('frameJ').srcdoc = b64ToUtf8(JIANGSHEN_B64);
  document.getElementById('frameG').srcdoc = b64ToUtf8(GM_B64);
}
function showTool(which){
  document.getElementById('frameJ').classList.toggle('active', which==='j');
  document.getElementById('frameG').classList.toggle('active', which==='g');
  document.getElementById('btnJ').classList.toggle('active', which==='j');
  document.getElementById('btnG').classList.toggle('active', which==='g');
}
window.addEventListener('DOMContentLoaded',()=>{bootFrames();initLicense();});
