<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>神州降神、經驗試算、掉落查詢系統｜v88c電腦版左右排版修正版</title>
<style>
:root{
  --bg:#07111f;--panel:#101a2d;--panel2:#0b1527;--line:#263a58;--text:#eaf2ff;--muted:#9fb4d4;
  --accent:#2dd4bf;--accent2:#60a5fa;--danger:#fb7185;--ok:#86efac;--shadow:0 18px 55px rgba(0,0,0,.42);
  --safe:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:linear-gradient(180deg,#07111f,#0c1424 48%,#101827);color:var(--text);font-family:"Microsoft JhengHei UI","Microsoft JhengHei",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
button,input,select,textarea{font:inherit}
button{cursor:pointer}
.topbar{position:sticky;top:0;z-index:50;background:rgba(7,17,31,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:calc(8px + env(safe-area-inset-top)) 12px 8px}
.topline{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:10px;max-width:1480px;margin:0 auto}
.menuBtn,.chipBtn,.primary,.ghost{border:1px solid var(--line);background:#0d1729;color:var(--text);border-radius:14px;padding:10px 12px;font-weight:900}
.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#06101f;border:0}
.brand{min-width:0}.brandTitle{font-weight:1000;font-size:16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.maker{font-size:12px;color:#d6e8ff;font-weight:900;text-align:right;white-space:nowrap}
.status{display:none!important;font-size:12px;color:#cfe9ff;font-weight:900;white-space:nowrap}
.app{max-width:1480px;margin:0 auto}
.backdrop{position:fixed;inset:0;background:rgba(0,0,0,.58);z-index:60;display:none}
.backdrop.open{display:block}
.drawer{position:fixed;z-index:70;top:0;bottom:0;left:0;width:min(90vw,390px);background:linear-gradient(180deg,#0b1324,#101827);border-right:1px solid var(--line);box-shadow:var(--shadow);transform:translateX(-105%);transition:.2s transform ease;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top)}
.drawer.open{transform:translateX(0)}
.drawerHead{display:flex;align-items:center;justify-content:space-between;padding:14px;border-bottom:1px solid var(--line)}
.drawerTitle{font-size:18px;font-weight:1000}.drawerBody{padding:12px;overflow:auto;-webkit-overflow-scrolling:touch}
.navGroup{border:1px solid var(--line);border-radius:18px;background:rgba(15,23,42,.68);padding:10px;margin-bottom:12px}
.navTitle{font-size:12px;color:var(--muted);font-weight:900;margin:2px 4px 8px}
.navBtn{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid transparent;background:transparent;color:#eaf2ff;border-radius:14px;padding:12px;font-weight:900;text-align:left}
.navBtn.active,.navBtn:active{background:linear-gradient(135deg,rgba(45,212,191,.2),rgba(96,165,250,.18));border-color:#355275}
.formBox{display:none;margin-top:8px;border-top:1px solid rgba(148,163,184,.16);padding-top:10px}.formBox.active{display:block}
label{display:block;font-size:12px;color:var(--muted);font-weight:900;margin:10px 2px 6px}
input,select{width:100%;border:1px solid var(--line);background:#081225;color:var(--text);border-radius:12px;padding:11px;outline:none}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.results{display:flex;flex-direction:column;gap:8px;margin-top:10px;max-height:48vh;overflow:auto;-webkit-overflow-scrolling:touch}
.resultItem{border:1px solid var(--line);background:#0b1527;color:var(--text);border-radius:14px;padding:10px;text-align:left}
.rName{font-weight:1000;font-size:15px}.rSub{color:var(--muted);font-size:12px;line-height:1.4;margin-top:3px}
.content{padding:14px 12px calc(84px + var(--safe))}
.reader{max-width:980px;margin:0 auto}.card{background:linear-gradient(180deg,rgba(16,26,45,.96),rgba(10,18,32,.96));border:1px solid var(--line);border-radius:22px;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,.24);margin-bottom:14px}
h1{font-size:24px;line-height:1.22;margin:0 0 8px}h2{font-size:19px;margin:0 0 12px}h3{font-size:16px;margin:18px 0 10px;color:#dbeafe}
.muted{color:var(--muted);line-height:1.65}.notice{background:rgba(45,212,191,.12);border:1px solid rgba(45,212,191,.28);border-radius:16px;padding:12px;color:#d8fff9;margin:10px 0;line-height:1.55}
.empty{border:1px dashed #375172;border-radius:18px;padding:18px;color:var(--muted);line-height:1.7;background:rgba(15,23,42,.45)}
.pill{display:inline-flex;align-items:center;border:1px solid var(--line);background:#0b1528;color:#cfe9ff;border-radius:999px;padding:5px 9px;font-size:12px;font-weight:900;margin:3px 4px 3px 0}
.quick{display:grid;grid-template-columns:1fr;gap:10px;margin-top:14px}.quick button{border:1px solid #355275;background:#0e1a2f;color:#fff;border-radius:16px;padding:14px;text-align:left;font-weight:1000}.quick small{display:block;color:var(--muted);font-weight:700;margin-top:4px}
.kvGrid{display:grid;grid-template-columns:1fr;gap:8px}.kv{border:1px solid rgba(148,163,184,.22);background:#081225;border-radius:14px;padding:10px}.k{font-size:12px;color:#8fb5df;font-weight:900;margin-bottom:4px}.v{font-size:15px;word-break:break-word;line-height:1.45}
.tableWrap{overflow:auto;border:1px solid var(--line);border-radius:16px;background:#081225;-webkit-overflow-scrolling:touch}table{border-collapse:collapse;width:100%;min-width:520px}th,td{border-bottom:1px solid rgba(148,163,184,.18);padding:10px;text-align:left;font-size:14px}th{color:#bfdbfe;background:#0c1a30;position:sticky;top:0}tr:last-child td{border-bottom:0}
.floatMenu{position:fixed;right:14px;bottom:calc(10px + var(--safe));z-index:45;border:0;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04111f;border-radius:999px;padding:13px 16px;font-weight:1000;box-shadow:var(--shadow)}
.authModal{position:fixed;inset:0;z-index:100;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.72);padding:16px}.authBox{width:min(560px,100%);background:#111827;border:1px solid #475569;border-radius:18px;padding:18px}.authBox textarea{width:100%;min-height:120px;background:#0c1424;color:#fff;border:1px solid #3a4a68;border-radius:12px;padding:10px}.error{color:#fda4af;font-weight:900;margin-top:8px}
.loadLine{margin:4px 0;color:#bfdbfe}.loadOk{color:var(--ok)}.loadBad{color:#fda4af}
@media (min-width:980px){
  .menuBtn,.backdrop,.closeOnly{display:none!important}
  .app{display:grid;grid-template-columns:380px 1fr;gap:18px;padding:18px}
  .drawer{position:sticky;top:86px;height:calc(100vh - 104px);transform:none!important;width:auto;border:1px solid var(--line);border-radius:24px;box-shadow:none;padding-top:0;overflow:hidden}
  .content{padding:0 0 80px}.reader{max-width:1060px;margin:0}.kvGrid{grid-template-columns:repeat(2,minmax(0,1fr))}.quick{grid-template-columns:repeat(2,minmax(0,1fr))}
}

@media (max-width:520px){
  .brandTitle{font-size:14px}
  .maker{font-size:11px}
  .topline{gap:8px}
}
.monsterSearchPage .results{max-height:none}
.homeQuick button small,.cleanQuick button small{display:none}

/* v84 大標題 / 小標題層級 */
.bigTitle{
  font-size:13px;
  color:#e0f2fe;
  font-weight:1000;
  letter-spacing:.08em;
  padding:8px 10px;
  margin:6px 0 8px;
  border-left:4px solid var(--accent);
  background:rgba(45,212,191,.08);
  border-radius:12px;
}
.subTitle{
  font-size:12px;
  color:#9fb4d4;
  font-weight:900;
  padding:6px 8px;
  margin:8px 0 6px;
  border:1px solid rgba(148,163,184,.18);
  border-radius:10px;
  background:rgba(15,23,42,.45);
}
.navBtn.sub{
  padding-left:20px;
  font-size:14px;
  opacity:.96;
}
.calcTabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin:10px 0 14px;
}
.calcTab{
  border:1px solid var(--line);
  background:#0b1527;
  color:var(--text);
  border-radius:14px;
  padding:12px 10px;
  font-weight:1000;
}
.calcTab.active{
  background:linear-gradient(135deg,rgba(45,212,191,.28),rgba(96,165,250,.25));
  border-color:#60a5fa;
}


/* v86 menu + item page */
.navBtn.major{
  font-size:16px;
  padding:14px 12px;
  border-color:rgba(96,165,250,.35);
  background:rgba(14,28,48,.72);
}
.navBtn.major.active{
  background:linear-gradient(135deg,rgba(45,212,191,.24),rgba(96,165,250,.24));
}
.navBtn.sub{
  padding-left:22px;
  font-size:14px;
}
.pageTabs{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin:10px 0 14px;
}
.pageTab{
  border:1px solid var(--line);
  background:#0b1527;
  color:var(--text);
  border-radius:14px;
  padding:12px 10px;
  font-weight:1000;
}
.pageTab.active{
  background:linear-gradient(135deg,rgba(45,212,191,.28),rgba(96,165,250,.25));
  border-color:#60a5fa;
}
.backBtn{
  display:inline-flex;
  margin-bottom:12px;
  border:1px solid var(--line);
  background:#0b1527;
  color:#dbeafe;
  border-radius:999px;
  padding:8px 12px;
  font-weight:900;
}


/* v88 desktop layout fix */
@media (min-width:980px){
  body{overflow-x:hidden}
  .app{
    display:grid!important;
    grid-template-columns:360px minmax(0,1fr)!important;
    gap:18px!important;
    align-items:start!important;
    padding:18px!important;
  }
  .drawer{
    position:sticky!important;
    top:86px!important;
    height:calc(100vh - 104px)!important;
    transform:none!important;
    width:auto!important;
    max-width:none!important;
    min-width:0!important;
    grid-column:1!important;
    align-self:start!important;
  }
  .content{
    grid-column:2!important;
    padding:0 0 80px!important;
    min-width:0!important;
    align-self:start!important;
  }
  .reader{
    max-width:1060px!important;
    margin:0!important;
  }
}


/* v88b 強制修正電腦版：左選單、右內容不能掉到下面 */
@media (min-width:980px){
  html,body{
    width:100%!important;
    overflow-x:hidden!important;
  }
  #mainShell{
    width:100%!important;
    max-width:none!important;
  }
  .app{
    width:100%!important;
    max-width:1480px!important;
    margin:0 auto!important;
    padding:18px!important;
    box-sizing:border-box!important;
    display:grid!important;
    grid-template-columns:360px minmax(0,1fr)!important;
    grid-template-areas:"menu content"!important;
    gap:18px!important;
    align-items:start!important;
  }
  .drawer{
    grid-area:menu!important;
    position:sticky!important;
    top:86px!important;
    width:360px!important;
    min-width:360px!important;
    max-width:360px!important;
    height:calc(100vh - 104px)!important;
    transform:none!important;
    float:none!important;
    display:flex!important;
    align-self:start!important;
  }
  .content{
    grid-area:content!important;
    width:100%!important;
    min-width:0!important;
    max-width:none!important;
    padding:0 0 80px!important;
    float:none!important;
    display:block!important;
    align-self:start!important;
  }
  .reader{
    width:100%!important;
    max-width:1060px!important;
    margin:0!important;
  }
}



/* v88c 電腦版左右排版修正：修正 HTML 結構後，再強制左右兩欄 */
@media (min-width:980px){
  .app{
    display:grid!important;
    grid-template-columns:360px minmax(0,1fr)!important;
    grid-template-areas:"menu content"!important;
  }
  .app > .drawer{
    grid-area:menu!important;
  }
  .app > .content{
    grid-area:content!important;
  }
}


/* v88i header emphasis + clean home */
.brandTitle{font-size:22px!important;font-weight:1000!important;letter-spacing:.02em!important;color:#f8fbff!important}
.maker{font-size:15px!important;font-weight:1000!important;color:#f8fbff!important;text-align:right!important}
.topbar{padding:calc(12px + env(safe-area-inset-top)) 24px 12px!important}
@media (max-width:700px){
  .brandTitle{font-size:17px!important;line-height:1.2!important}
  .maker{font-size:12px!important}
  .topbar{padding:calc(10px + env(safe-area-inset-top)) 12px 10px!important}
}

</style>
</head>
<body>
<div id="mainShell">

function itemStatus(it){
 const raw=String(it?.ExtraStatus||'').trim();
 if(!raw || raw==='0')return '';
 const parts=raw.split(/[,\s;]+/).filter(Boolean);
 const names=parts
   .map(x=>{
     const n=statusName(x)||magicName(x);
     if(n)return n;
     // 舊版會在無法轉名時顯示 StatusID，但只限數字或 0x 代碼。
     if(/^\d+$/.test(String(x))||/^0x/i.test(String(x)))return `StatusID:${x}`;
     return '';
   })
   .filter(Boolean);
 return [...new Set(names)].join('、');
}

const ITEM_DETAIL_RENAME={'Name':'名稱','Type':'類型','Kind':'專剋','ExtraStatus':'特殊能力','Level':'等級','CLevel':'職等','HP':'血量','MP':'精力','Con':'體魄','Str':'力量','Int':'智慧','Dex':'靈敏','ExtraDef':'物理防禦','MagicAttack':'術法攻擊','MagicDef':'術法防禦','IceDef':'冰防','FireDef':'火防','LightningDef':'電防','DarkDef':'冥防','ParalysisRes':'抗定身','PosionRes':'抗毒','BlindRes':'抗盲目','SilentRes':'抗禁咒','Value':'價值'};

function itemDetailRows(it){
 const rows=[];
 for(const k of ITEM_DETAIL_ORDER){
  if(k==='Damage'){
   if(it.DamageMin||it.DamageMax)rows.push(['傷害',`${it.DamageMin||''}~${it.DamageMax||''}`]);
   continue;
  }
  if(k==='Type'){
   const typeName=itemTypeName(it.Type)||it.Type;
   if(typeName)rows.push(['類型',typeName]);
   continue;
  }
  if(k==='Kind'){
   const kindName=itemKind(it);
   if(kindName)rows.push(['專剋',kindName]);
   continue;
  }
  if(k==='ExtraStatus'){
   const statusName=itemStatus(it);
   if(statusName)rows.push(['特殊能力',statusName]);
   continue;
  }
  if(k in it && String(it[k]??'').trim()!=='')rows.push([ITEM_DETAIL_RENAME[k]||k,it[k]]);
 }
 if(it.Help)rows.push(['說明',it.Help]);
 return rows;
}

function itemAbilityFields(it){
 const abilityKeys=new Set(['CLevel','HP','MP','Con','Str','Int','Dex','ExtraDef','Damage','MagicAttack','MagicDef','IceDef','FireDef','LightningDef','DarkDef','ParalysisRes','PosionRes','BlindRes','SilentRes','Value']);
 return itemDetailRows(it).filter(([label])=>{
   const reverse=Object.entries(ITEM_DETAIL_RENAME).find(([,v])=>v===label)?.[0];
   if(label==='傷害')return true;
   return abilityKeys.has(reverse||label);
 });
}

function candidateUrls(name){const enc=encodeURIComponent(name).replace(/%2F/g,'/'); return ['./'+enc, RAW_BASE+enc]}
async function fetchTimeout(url,ms=12000){const ctrl=new AbortController();const t=setTimeout(()=>ctrl.abort(),ms);try{return await fetch(url,{cache:'no-store',signal:ctrl.signal})}finally{clearTimeout(t)}}
async function fetchFirst(names,label){
 const tried=[];
 for(const name of names){
  for(const url of candidateUrls(name)){
   try{
    loadLine(`讀取 ${esc(name)} ...`);
    const res=await fetchTimeout(url);
    tried.push(`${url} HTTP ${res.status}`);
    if(res.ok){
      const buf=await res.arrayBuffer();
      let text='';
      try{text=new TextDecoder('big5').decode(buf)}catch(e){}
      if(!text || text.includes('�')){try{text=new TextDecoder('utf-8').decode(buf)}catch(e){}}
      if(text&&text.trim()){loadLine(`成功：${esc(name)} (${Math.round(buf.byteLength/1024)} KB)`,'ok');return {name,text,tried}}
    }
   }catch(e){tried.push(`${url} ${e.name==='AbortError'?'逾時':(e.message||e)}`)}
  }
 }
 loadLine(`${esc(label)} 讀取失敗`,'bad');
 return {missing:true,tried};
}
function parseIni(text){
 const data=[];let cur=null;function push(){if(cur&&Object.keys(cur).length)data.push(cur);cur=null}
 for(const raw of String(text||'').replace(/^\ufeff/,'').split(/\r?\n/)){
  const line=String(raw||'').trim(); if(!line||line.startsWith('//')||line.startsWith(';'))continue;
  if(line.startsWith('[')&&line.endsWith(']')){push();cur={};continue}
  const p=line.indexOf('='); if(p<0)continue;
  const k=line.slice(0,p).trim(), v=line.slice(p+1).trim();
  if(/^ID$/i.test(k)&&cur&&(cur.ID!==undefined||cur.Id!==undefined||cur.id!==undefined))push();
  if(!cur)cur={}; cur[k]=v;
 }
 push(); return data.filter(x=>x&&(x.ID!==undefined||x.Name!==undefined));
}
function parseCSVLine(line){const out=[];let val='',q=false;for(let i=0;i<line.length;i++){const c=line[i],n=line[i+1];if(q){if(c==='"'&&n==='"'){val+='"';i++}else if(c==='"')q=false;else val+=c}else{if(c==='"')q=true;else if(c===','){out.push(val);val=''}else val+=c}}out.push(val);return out.map(x=>String(x||'').trim())}
function parseLocations(text){const map={};for(const raw of String(text||'').replace(/^\ufeff/,'').split(/\r?\n/)){const line=raw.trim();if(!line||line.startsWith('//'))continue;let p=line.includes(',')?parseCSVLine(line):line.split(/\t+/).map(x=>x.trim());p=p.filter(Boolean);if(p.length<2)continue;const n=p[0],loc=p.slice(1).join('、');if(!n||n==='怪物名稱'||n.toLowerCase()==='name')continue;if(map[n]&&!map[n].includes(loc))map[n]+='、'+loc;else map[n]=loc}return map}
function parseDrop(v){
 const nums=String(v||'').split(',').map(x=>x.trim()).filter(Boolean); if(nums.length<4)return [];
 const raw=[]; for(let i=2;i+1<nums.length;i+=2){const id=String(nums[i]).trim();const w=Number(nums[i+1]);if(id&&id!=='0'&&Number.isFinite(w)&&w>0)raw.push([id,w])}
 const total=raw.reduce((s,x)=>s+x[1],0); return total?raw.map(([id,w])=>[id,w/total*100,w,total]):[];
}
function buildDataIndexes(){
 itemIndex={};magicIndex={};statusIndex={};dropReverse={};
 for(const it of items)itemIndex[String(it.ID).trim()]=it;
 for(const m of magics)magicIndex[String(m.ID).trim()]=m;
 for(const s of statuses)statusIndex[String(intOf(s.ID))]=s;
 for(const m of monsters){for(const [iid,rate] of parseDrop(m.DropItem)){if(!dropReverse[iid])dropReverse[iid]=[];dropReverse[iid].push({monster:m,rate})}}
 for(const iid of Object.keys(dropReverse))dropReverse[iid].sort((a,b)=>b.rate-a.rate);
 const sel=byId('itemType'); if(sel){sel.innerHTML='<option value="">全部類型</option>'+Object.entries(ITEM_TYPE_MAP).map(([k,v])=>`<option value="${esc(k)}">${esc(v)}</option>`).join('')}
}
async function loadAllData(){
 renderLoad();
 setTopStatus('讀取中');
 try{
  const mon=await fetchFirst(FILES.monsters,'怪物 INI');
  const item=await fetchFirst(FILES.items,'道具 INI');
  const magic=await fetchFirst(FILES.magics,'技能 INI');
  const status=await fetchFirst(FILES.statuses,'狀態 INI');
  const loc=await fetchFirst(FILES.locations,'怪物位置 CSV');

  if(mon.missing||item.missing||magic.missing)throw new Error('必要檔案讀取失敗');

  monsters=parseIni(mon.text);
  items=parseIni(item.text);
  magics=parseIni(magic.text);
  statuses=status.missing?[]:parseIni(status.text);
  monsterLocations=loc.missing?{}:parseLocations(loc.text);

  // v82：排除第一筆/雜訊 UNKNOWN，但保留原始 INI 順序。
  monsters=monsters.filter(x=>{
    const n=nameOf(x).trim().toUpperCase();
    return n && n!=='UNKNOWN' && n!=='NULL';
  });
  items=items.filter(x=>{
    const n=nameOf(x).trim().toUpperCase();
    return n && n!=='UNKNOWN' && n!=='NULL';
  });

  if(!monsters.length||!items.length||!magics.length)throw new Error('解析後資料不足');

  buildDataIndexes();
  setTopStatus('已載入');
  renderHome();
 }catch(e){
  setTopStatus('讀取失敗');
  loadLine(String(e.message||e),'bad');
  byId('manualGroup').style.display='block';
 }
}

function canonicalName(n){n=String(n??'').trim();if(!n||n==='空格')return null;if(DATA.aliases[n])return DATA.aliases[n];if(DATA.baseStats[n])return n;return null}
function ability(n,star){const c=canonicalName(n); if(!c)throw new Error('找不到降神：'+n); const base=DATA.baseStats[c], out={}; for(const st of STATS)out[st]=Number(base[st]||0)*Number(DATA.starMultipliers[st][star]||1); return out}
function scaleAbility(src,rate=1){const out={}; for(const st of STATS)out[st]=Number(src[st]||0)*rate; return out}
function activeCombos(names){const set=new Set(names.map(canonicalName).filter(Boolean)), res=[]; for(const [combo,members] of Object.entries(DATA.comboMembers)){const need=members.map(canonicalName).filter(Boolean); if(need.length&&need.every(x=>set.has(x)))res.push(combo)} return res}
function comboBonus(combos){const total=Object.fromEntries(STATS.map(s=>[s,0])); for(const c of combos){const b=DATA.comboBonuses[c]||{}; for(const st of STATS)total[st]+=Number(b[st]||0)} return total}
function comboText(c){const b=DATA.comboBonuses[c]||{}, parts=[]; for(const st of STATS){if(b[st])parts.push(`${st}+${fmt(b[st])}`)} return parts.join('、')||'無'}

function updateSupportOptions(){
 const selects=[...document.querySelectorAll('.jsSupportName')];
 const values=selects.map(s=>s.value);
 const chosen=values.filter(Boolean);
 for(const sel of selects){
  const self=sel.value;
  const current=self;
  sel.innerHTML='<option value="">空白</option>'+DISPLAY_NAMES.filter(n=>n===current || !chosen.includes(n)).map(n=>`<option value="${esc(n)}" ${n===current?'selected':''}>${esc(n)}</option>`).join('');
 }
}
function renderJiangHome(){
 byId('reader').innerHTML=`<section class="card"><h1>降神、經驗試算</h1>
 <div class="quick cleanQuick">
  <button data-jiang-open="support">副降神模擬</button>
  <button data-jiang-open="compare">主降神比較</button>
  <button data-jiang-open="stars">20星等</button>

function calcSupport(){
 updateSupportOptions();
 window.v86LastView='jiang';
 const picks=[];
 const used=new Set();
 for(let i=0;i<5;i++){
  const n=byId('jsN'+i)?.value;
  const s=intOf(byId('jsS'+i)?.value,1);
  const role=i===0?'主降神':`副降神 ${i}`;
  const rate=i===0?1:0.1;
  if(n && !used.has(n)){picks.push({n,s,role,rate});used.add(n);}
 }
 if(!picks.length){empty('請選擇主降神或副降神');return}

 const total=Object.fromEntries(STATS.map(s=>[s,0]));
 const rows=[];
 for(const p of picks){
  const raw=ability(p.n,p.s);
  const a=scaleAbility(raw,p.rate);
  rows.push([p.n,p.s,p.role,p.rate,a]);
  for(const st of STATS)total[st]+=a[st];
 }
 const combos=activeCombos(picks.map(x=>x.n)), bonus=comboBonus(combos);
 for(const st of STATS)total[st]+=bonus[st];

 byId('reader').innerHTML=`<section class="card">${backButtonHTML('jiang')}<h1>副降神模擬</h1>
 <div class="muted">${picks.map(p=>`${esc(p.role)}：${esc(p.n)} ${p.s}星 ${p.rate===1?'100%':'10%'}`).join('、')}</div>
 <h3>總能力</h3><div class="kvGrid">${STATS.map(st=>`<div class="kv"><div class="k">${esc(st)}</div><div class="v">${fmt(total[st])}</div></div>`).join('')}</div>
 <h3>成立連結</h3>${combos.length?combos.map(c=>`<div class="notice"><b>${esc(c)}</b><br>${esc((DATA.comboMembers[c]||[]).join('、'))}<br>${esc(comboText(c))}</div>`).join(''):'<div class="empty">沒有成立連結</div>'}
 <h3>各降神能力</h3>${rows.map(([n,s,role,rate,a])=>`<div class="card" style="box-shadow:none"><h2>${esc(role)}｜${esc(n)}｜${s}星｜${rate===1?'100%':'10%'}</h2><div class="kvGrid">${STATS.map(st=>`<div class="kv"><div class="k">${esc(st)}</div><div class="v">${fmt(a[st])}</div></div>`).join('')}</div></div>`).join('')}
 </section>`;
 closeDrawer();
 window.scrollTo({top:0,behavior:'smooth'});
}
function calcCompare(){
 window.v86LastView='jiang';
 const a=byId('jsA').value,b=byId('jsB').value;if(!a||!b){empty('請選擇兩位降神');return}
 const as=intOf(byId('jsAS').value,20),bs=intOf(byId('jsBS').value,20),A=ability(a,as),B=ability(b,bs);
 byId('reader').innerHTML=`<section class="card">${backButtonHTML('jiang')}<h1>主降神比較</h1><div class="muted">${esc(a)} ${as}星 vs ${esc(b)} ${bs}星</div><div class="tableWrap"><table><thead><tr><th>能力</th><th>${esc(a)}</th><th>${esc(b)}</th><th>差異</th></tr></thead><tbody>${STATS.map(st=>`<tr><td>${esc(st)}</td><td>${fmt(A[st])}</td><td>${fmt(B[st])}</td><td>${fmt(A[st]-B[st])}</td></tr>`).join('')}</tbody></table></div></section>`;
 closeDrawer();
 window.scrollTo({top:0,behavior:'smooth'});
}

 window.v86LastView='jiang';

 byId('reader').innerHTML=`<section class="card">${backButtonHTML('jiang')}<h1>${esc(n)}｜0～20 星能力總表</h1>
 <div class="tableWrap"><table><thead><tr><th>星等</th>${STATS.map(st=>`<th>${esc(st)}</th>`).join('')}</tr></thead><tbody>${Array.from({length:21},(_,lv)=>{const a=ability(n,lv);return `<tr><td>${lv} 星</td>${STATS.map(st=>`<td>${fmt(a[st])}</td>`).join('')}</tr>`}).join('')}</tbody></table></div>
 </section>`;

function calcStarAura(){
 window.v86LastView='jiang';
 const c=intOf(byId('needCur').value);
 const t=intOf(byId('needTar').value);
 const owned=intOf(byId('needOwned').value);
 const rate=Math.max(1,intOf(byId('needRate').value,1));
 let need=0;
 for(let s=c+1;s<=t;s++)need+=Number(DATA.starRequirements[String(s)]?.single||0);
 need=Math.max(0,Math.ceil((need-owned)/rate));

 const ac=Math.max(1,intOf(byId('auraCur').value,1));
 const at=Math.max(ac,intOf(byId('auraTar').value,ac));
 let aura=0;
 for(let lv=ac+1;lv<=at;lv++)aura+=Number(DATA.auraTable[String(lv)]?.single||DATA.auraTable[String(lv)]?.total||0);

 byId('reader').innerHTML=`<section class="card">${backButtonHTML('jiang')}<h1>星等 / 靈氣計算結果</h1>
 <h3>星等</h3><div class="kvGrid">
  <div class="kv"><div class="k">目前星等 → 目標星等</div><div class="v">${c} 星 → ${t} 星</div></div>
  <div class="kv"><div class="k">已有降神魂數量</div><div class="v">${fmt(owned)}</div></div>
  <div class="kv"><div class="k">降神倍率</div><div class="v">${fmt(rate)}</div></div>
  <div class="kv"><div class="k">需要的降神數量</div><div class="v">${fmt(need)}</div></div>
 </div>
 <h3>靈氣</h3><div class="kvGrid">
  <div class="kv"><div class="k">目前等級 → 目標等級</div><div class="v">${ac} → ${at}</div></div>
  <div class="kv"><div class="k">所需靈氣</div><div class="v">${fmt(aura)}</div></div>
 </div></section>`;
 window.scrollTo({top:0,behavior:'smooth'});
}
function calcExpNeed(){
 window.v86LastView='jiang';
 const expCur=Math.max(1,intOf(byId('expCur')?.value,1));
 const expTar=Math.max(expCur,intOf(byId('expTar')?.value,2000));

 const curExp=BigInt(DATA.expTable[String(expCur)]||0);
 const tarExp=BigInt(DATA.expTable[String(expTar)]||0);
 const expTotal=tarExp>curExp ? tarExp-curExp : 0n;

 const pills=[
  ['乙太經驗丹（8000億）',800000000000n],
  ['聖鑽經驗丹（3000億）',300000000000n],
  ['真元經驗丹（500億）',50000000000n]
 ];
 function group255(n){n=BigInt(n);return [n/255n,n%255n]}
 const rows=pills.map(([name,val])=>{
  const need=(expTotal+val-1n)/val;
  const [g,r]=group255(need);
  return [name,fmt(need),`${fmt(g)} 組 + ${fmt(r)} 顆`];
 });

 byId('reader').innerHTML=`<section class="card">${backButtonHTML('jiang')}<h1>等級經驗計算結果</h1>
 <div class="kvGrid">
  <div class="kv"><div class="k">${expCur} 等 → ${expTar} 等需要的經驗值</div><div class="v">${fmt(expTotal)}</div></div>
 </div>
 <h3>經驗丹換算</h3>
 <div class="tableWrap"><table><thead><tr><th>經驗丹</th><th>需要顆數</th><th>組數</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r[0])}</td><td>${esc(r[1])}</td><td>${esc(r[2])}</td></tr>`).join('')}</tbody></table></div>
 </section>`;
 window.scrollTo({top:0,behavior:'smooth'});
}
function calcEatPill(){
 window.v86LastView='jiang';
 const start=Math.max(1,intOf(byId('eatStartLv')?.value,1));
 const unitYi=Math.max(0,intOf(byId('eatUnitYi')?.value,0));
 const count=BigInt(Math.max(0,intOf(byId('eatCount')?.value,0)));
 const expPer=BigInt(unitYi)*100000000n;
 const baseExp=BigInt(DATA.expTable[String(start)]||0);
 let totalExp=baseExp + count*expPer;
 let lv=start;

 while(lv<9999){
  const nextNeed=BigInt(DATA.expTable[String(lv+1)]||0);
  if(nextNeed<=0n || totalExp<nextNeed)break;
  lv++;
 }
 const remain=totalExp-BigInt(DATA.expTable[String(lv)]||0);

 byId('reader').innerHTML=`<section class="card">${backButtonHTML('jiang')}<h1>經驗丹升等試算結果</h1>
 <div class="kvGrid">
  <div class="kv"><div class="k">現在等級</div><div class="v">${start}</div></div>
  <div class="kv"><div class="k">經驗丹單位</div><div class="v">${fmt(unitYi)} 億</div></div>
  <div class="kv"><div class="k">經驗丹數量</div><div class="v">${fmt(count)}</div></div>
  <div class="kv"><div class="k">可提升到</div><div class="v">${lv} 等</div></div>
  <div class="kv"><div class="k">目前等級內剩餘經驗</div><div class="v">${fmt(remain)}</div></div>
 </div></section>`;
 window.scrollTo({top:0,behavior:'smooth'});
}

function initEvents(){
 byId('openMenuBtn').onclick=openDrawer;byId('closeMenuBtn').onclick=closeDrawer;byId('backdrop').onclick=closeDrawer;
 document.addEventListener('change',e=>{if(e.target.classList&&e.target.classList.contains('jsSupportName'))updateSupportOptions();});
 document.addEventListener('click',e=>{const v=e.target.closest('[data-view]')?.dataset.view;if(v)setView(v);const o=e.target.closest('[data-open]')?.dataset.open;if(o){setView(o);if(window.innerWidth<980)openDrawer()}const jo=e.target.closest('[data-jiang-open]')?.dataset.jiangOpen;if(jo){setJiang(jo);if(window.innerWidth<980)openDrawer()}const jk=e.target.closest('[data-jiang]')?.dataset.jiang;if(jk)setJiang(jk);const mid=e.target.closest('[data-monster]')?.dataset.monster;if(mid)showMonster(mid);const iid=e.target.closest('[data-item]')?.dataset.item;if(iid)showItem(iid);const rid=e.target.closest('[data-rev]')?.dataset.rev;if(rid)showReverse(rid);const rr=e.target.closest('[data-reverse-item]')?.dataset.reverseItem;if(rr)showReverse(rr);if(e.target.classList&&e.target.classList.contains('jsSupportName'))updateSupportOptions();if(e.target.id==='calcSupport')calcSupport();if(e.target.id==='calcCompare')calcCompare();if(e.target.id==='calcStars')calcStars();if(e.target.id==='calcNeeds')calcNeeds();if(e.target.id==='calcStarAura')calcStarAura();if(e.target.id==='calcExpNeed')calcExpNeed();if(e.target.id==='calcEatPill')calcEatPill();const et=e.target.closest('[data-exp-tab]');if(et){document.querySelectorAll('.calcTab').forEach(b=>b.classList.remove('active'));et.classList.add('active');byId('expTabNeed').style.display=et.dataset.expTab==='need'?'block':'none';byId('expTabEat').style.display=et.dataset.expTab==='eat'?'block':'none';}});
 ['monsterQ','monsterMin','monsterMax'].forEach(id=>{const el=byId(id); if(el)el.addEventListener('input',searchMonsters);});
 
 
 document.addEventListener('input',e=>{if(['monsterQMain','monsterMinMain','monsterMaxMain'].includes(e.target.id))searchMonstersMain();if(['itemQ','itemMin','itemMax'].includes(e.target.id))searchItems();if(e.target.id==='reverseQ')searchReverseItems();});
 document.addEventListener('change',e=>{if(e.target.id==='itemType')searchItems();});
 document.addEventListener('click',e=>{const tab=e.target.closest('[data-item-tab]')?.dataset.itemTab;if(tab){renderItemPage(tab);}});
 byId('manualFiles').addEventListener('change',async e=>{alert('v86 先以自動讀取為主，手動載入下一版再補。')});
}
function initAuth(){ if(!AUTH_REQUIRED)return true; try{const key=localStorage.getItem('combined_manual_tool_license_key'); if(key&&typeof validateLicenseKey==='function'){validateLicenseKey(key);return true}}catch(e){} byId('mainShell').style.display='none';byId('licenseModal').style.display='flex';return false}
function init(){initEvents();renderHome(); const ok=initAuth(); if(ok)loadAllData();}
document.addEventListener('DOMContentLoaded',init);
